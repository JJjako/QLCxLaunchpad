# Launchpad Mini MK3 → QLC+ OSC Bridge Configuration

[osc]
host = "127.0.0.1"
port = 7700

[midi]
device_name = "MIDIIN2 (LPMiniMK3 MIDI)"
device_out_name = "LPMiniMK3 MIDI"

# ─────────────────────────────────────────────────────────────────────────────
# PAGES
# Each page fills the 8×8 grid of the Launchpad.
#
# Launchpad Mini MK3 note layout (top-left = 81, bottom-left = 11):
#
#   [Page keys: top row notes 91–98]
#
#   81 82 83 84 85 86 87 88
#   71 72 73 74 75 76 77 78
#   61 62 63 64 65 66 67 68
#   51 52 53 54 55 56 57 58
#   41 42 43 44 45 46 47 48
#   31 32 33 34 35 36 37 38
#   21 22 23 24 25 26 27 28
#   11 12 13 14 15 16 17 18
#
# Common palette colours (0–127):
#   0   = off          5   = dim red       21  = dim green
#   45  = blue         72  = white         13  = yellow
#   57  = cyan         96  = orange        53  = purple
#   79  = pink
# ─────────────────────────────────────────────────────────────────────────────

# ── PAGE 0: Custom / Freestyle ────────────────────────────────────────────────
# All 64 pads are freely assignable.
# Short press  → sends OSC to /qlc/custom/<pad_index> (1–64) with value 1.0
#                unless you list an explicit [[pages.buttons]] entry below,
#                in which case that entry's osc_address / osc_value are used.
# Long press (≥500 ms) → opens the colour picker on the grid itself.
#   - The 64 pads display palette colours 1–64.
#   - Tap a colour pad to assign it to the held button.
#   - Press any top-row button to cancel without changing the colour.
#
# You can pre-assign colours and OSC addresses in the buttons list below.
# Any pad NOT listed gets colour 21 (dim green) and auto-address /qlc/custom/<n>.
[[pages]]
name = "Custom"
selector_color = 21   # dim green
custom_mode = true    # ← enables long-press colour picker + full-grid OSC

  # Optional: explicitly configure some pads.
  # Remove or add entries freely — unlisted pads still work, just with defaults.
  [[pages.buttons]]
  note = 81
  label = "Pad 1 – Strobe"
  color = 72          # white
  osc_address = "/qlc/function/1"
  osc_value = 1.0

  [[pages.buttons]]
  note = 82
  label = "Pad 2 – Blackout"
  color = 5           # dim red
  osc_address = "/qlc/function/99"
  osc_value = 1.0

  [[pages.buttons]]
  note = 83
  label = "Pad 3 – Full ON"
  color = 13          # yellow
  osc_address = "/qlc/function/100"
  osc_value = 1.0

# ── PAGE 1: Main dashboard ────────────────────────────────────────────────────
# Layout (cols 0–7 left to right, row 0 = bottom):
#
#   [0][1] | [2][3] | [4] | [5] | [6] | [7]
#   trig   | sel A  |fad A|trig | sel |flash
#
#   Cols 0–1           = colour-pickable triggers (CC 19 + tap to recolour)
#   Cols 2–3           = pick 1 of 16 fader-A sources (col 2 = 1–8, col 3 = 9–16)
#   Col 4              = live 8-step fader for fader-A selection (OSC immediate)
#   Col 5 rows 0–5     = extra triggers
#   Col 6              = pick fader 1–8 (row 0 bottom = fader 1) for col 7
#   Col 7              = flash fader: row 0 = momentary flash, rows 1–7 = level
#
#   Fader-A uses all 16 OSC addresses below; fader-B picks from the first 8.
#   A and B keep independent column heights; switching profile sends OFF to the
#   old address (A also applies its column level to the new address).
#   Unlisted trigger pads default to /lp/main/<note> on release.
[[pages]]
name = "Main"
selector_color = 72
main_mode = true

  [pages.fader_config]
  flash_addresses = [
    "/qlc/ff1", "/qlc/ff2", "/qlc/ff3", "/qlc/ff4",
    "/qlc/ff5", "/qlc/ff6", "/qlc/ff7", "/qlc/ff8"
  ]
  addresses = [
    "/lp/f1",  "/lp/f2",  "/lp/f3",  "/lp/f4",
    "/lp/f5",  "/lp/f6",  "/lp/f7",  "/lp/f8",
    "/lp/f9",  "/lp/f10", "/lp/f11", "/lp/f12",
    "/lp/f13", "/lp/f14", "/lp/f15", "/lp/f16",
  ]
  color_on  = 13
  color_off = 0
  

  # Optional: pre-assign triggers in cols 0–1 and col 5 (note = grid position).
  [[pages.buttons]]
  note = 81
  label = "Strobe"
  color = 72
  osc_address = "/qlc/function/1"
  osc_value = 1.0

  [[pages.buttons]]
  note = 71
  label = "Blackout"
  color = 5
  osc_address = "/qlc/function/99"
  osc_value = 1.0

  [[pages.buttons]]
  note = 72
  label = "Full ON"
  color = 13
  osc_address = "/qlc/function/100"
  osc_value = 1.0

  [[pages.buttons]]
  note = 16
  label = "Scene A"
  color = 45
  osc_address = "/qlc/function/10"
  osc_value = 1.0

[[pages]]
name = "Main"
selector_color = 72
main_mode = true

  [pages.fader_config]
  flash_addresses = [
    "/qlc/ff9", "/qlc/ff10", "/qlc/f11", "/qlc/ff12",
    "/qlc/ff13", "/qlc/ff14", "/qlc/ff15", "/qlc/ff16"
  ]
  addresses = [
    "/lp/f17",  "/lp/f18",  "/lp/f19",  "/lp/f20",
    "/lp/f21",  "/lp/f22",  "/lp/f23",  "/lp/f24",
    "/lp/f25",  "/lp/f26", "/lp/f27", "/lp/f28",
    "/lp/f29", "/lp/f30", "/lp/f31", "/lp/f32",
  ]
  color_on  = 13
  color_off = 0
  

# ── PAGE 2: Static Scenes ─────────────────────────────────────────────────────
# ── PAGE 3: Moving Heads X/Y ──────────────────────────────────────────────────
[[pages]]
name = "MovingHeads"
selector_color = 79
xy_mode = true

  [pages.xy_config]
  pan_address    = "/qlc/channel/1"
  tilt_address   = "/qlc/channel/2"
  color_inactive = 45
  color_active   = 72

# ── PAGE 4: Dimmer Sliders ────────────────────────────────────────────────────
[[pages]]
name = "Dimmers"
selector_color = 96
fader_mode = true

  [pages.fader_config]
  addresses = [
    "/lp/f31",
    "/lp/f32",
    "/lp/f33",
    "/lp/f34",
    "/lp/f35",
    "/lp/f36",
    "/lp/f37",
    "/lp/f38",
  ]
  flash_addresses = [
    "/qlc/ff1", "/qlc/ff2", "/qlc/ff3", "/qlc/ff4",
    "/qlc/ff5", "/qlc/ff6", "/qlc/ff7", "/qlc/ff8"
  ]
  color_on  = 13
  color_off = 0

# ── PAGE 5: RGBW ──────────────────────────────────────────────────────────────
# Grid layout (8 cols, 8 rows):
#   cols 0-1 = Red   fader  (both cols mirror each other)
#   cols 2-3 = Green fader
#   cols 4-5 = Blue  fader
#   cols 6-7 = White fader
#   Each fader: row 0 (bottom) = step 1 (lowest), row 7 (top) = step 8 (full)
#   Tap a step to set that level; tap the same step again to turn off.
#
# Right-side buttons (CC 89 top → CC 19 bottom):
#   CC 89 (top)  = profile 0 = MASTER  → controls all 6 fixtures simultaneously
#   CC 79        = profile 1 = fixture 1
#   CC 69        = profile 2 = fixture 2
#   CC 59        = profile 3 = fixture 3
#   CC 49        = profile 4 = fixture 4
#   CC 39        = profile 5 = fixture 5
#   CC 29        = profile 6 = fixture 6
#   CC 19 (btm)  = unused
#
#   Tap a profile button to switch to that fixture.
#   Tap the ACTIVE profile button to cycle the master dimmer: 0→25→50→75→100→0%
#
# State is saved to rgbw_state.json next to config.toml.
[[pages]]
name = "RGBW"
selector_color = 57   # cyan
rgbw_mode = true

  [pages.rgbw_config]
  # One OSC address per fixture (6 fixtures) for each channel.
  # Adjust these to match your QLC+ channel assignments.
  r_addresses = [
    "/lp/r1",
    "/lp/r2",
    "/lp/r3",
    "/lp/r4",
    "/lp/r5",
    "/lp/r6",
  ]
  g_addresses = [
    "/lp/g1",
    "/lp/g2",
    "/lp/g3",
    "/lp/g4",
    "/lp/g5",
    "/lp/g6",
  ]
  b_addresses = [
    "/lp/b1",
    "/lp/b2",
    "/lp/b3",
    "/lp/b4",
    "/lp/b5",
    "/lp/b6",
  ]
  w_addresses = [
    "/lp/w1",
    "/lp/w2",
    "/lp/w3",
    "/lp/w4",
    "/lp/w5",
    "/lp/w6",
  ]

# ── PAGE 6: Flash + Fader ─────────────────────────────────────────────────────
# Each of the 8 columns has:
#   Row 0 (bottom): momentary flash button
#     - when pressed: sends current fader value to fader_config.addresses[col]
#     - when released: sends 0.0 to fader_config.addresses[col]
#   Rows 1-7: 7-step fader
#     - step 1 (row 1) = 0.0, step 7 (row 7) = 1.0
#     - sends to fader_config.addresses[col]
#     - tap same step again to reset to 0
[[pages]]
name = "FlashFader"
selector_color = 96   # orange
flash_fader_mode = true

[pages.fader_config]
addresses = [
  "/lp/ff1",
  "/lp/ff2",
  "/lp/ff3",
  "/lp/ff4",
  "/lp/ff5",
  "/lp/ff6",
  "/lp/ff7",
  "/lp/ff8",
]
  flash_addresses = [
    "/qlc/ff1", "/qlc/ff2", "/qlc/ff3", "/qlc/ff4",
    "/qlc/ff5", "/qlc/ff6", "/qlc/ff7", "/qlc/ff8"
  ]
color_on  = 72   # white for active fader steps and flash button
color_off = 1    # very dim for inactive steps
# ── Nudge XY (master + 4 heads) ───────────────────────────────────────────────
# Right-side CCs (top → bottom): CC89=master, CC79=head1, CC69=head2,
# CC59=head3, CC49=head4. CC39/29/19 unused.
# Master nudges all heads; each head profile has its own pan/tilt OSC pair.
# State saved to nudge_xy_state.json next to config.toml.
[[pages]]
name = "Nudge XY"
selector_color = 79
nudge_xy_mode = true

  [pages.nudge_xy_config]
  pan_addresses = [
    "/lp/x1",
    "/lp/x2",
    "/lp/x3",
    "/lp/x4",
  ]
  tilt_addresses = [
    "/lp/y1",
    "/lp/y2",
    "/lp/y3",
    "/lp/y4",
  ]

  [pages.xy_config]
  pan_address    = "/lp/x1"   # legacy fallback if nudge_xy_config omitted
  tilt_address   = "/lp/y1"
  color_inactive = 1
  color_active   = 72